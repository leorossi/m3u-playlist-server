monolog:
    channels:
        - deprecation
    handlers:
        main:
            type: rotating_file
            path: '%kernel.logs_dir%/%kernel.environment%.log'
            level: debug
            max_files: 7
            filename_format: '{filename}-{date}'
            date_format: 'Y-m-d'
            channels: ['!event']

        console:
            type: console
            process_psr_3_messages: false
            channels: ['!event', '!doctrine', '!console']

when@prod:
    monolog:
        handlers:
            main:
                type: rotating_file
                path: '%kernel.logs_dir%/%kernel.environment%.log'
                level: info
                max_files: 7
                filename_format: '{filename}-{date}'
                date_format: 'Y-m-d'
                channels: ['!event']

            deprecation:
                type: rotating_file
                path: '%kernel.logs_dir%/deprecation.log'
                level: info
                max_files: 7
                filename_format: '{filename}-{date}'
                date_format: 'Y-m-d'
                channels: [deprecation]
